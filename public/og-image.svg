<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1220"/>
      <stop offset="50%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#0B1220"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>

  <!-- Glowing orbs -->
  <circle cx="200" cy="150" r="120" fill="#3B82F6" opacity="0.06"/>
  <circle cx="1000" cy="480" r="160" fill="#8B5CF6" opacity="0.05"/>

  <!-- Logo icon -->
  <rect x="80" y="220" width="70" height="70" rx="16" fill="#3B82F6"/>
  <text x="115" y="271" font-family="Arial" font-size="38" font-weight="900" fill="white" text-anchor="middle">H</text>

  <!-- Brand name -->
  <text x="170" y="258" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="url(#textGrad)">HiTecH</text>
  <text x="170" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#9CA3AF">Technology HUB by Waqas</text>

  <!-- Tagline -->
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="white">Learn AI. Build Smarter.</text>
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)">Automate Everything.</text>

  <!-- URL -->
  <text x="80" y="540" font-family="Arial, sans-serif" font-size="22" fill="#6B7280">www.hitechtechnologyhub.com</text>

  <!-- Tags -->
  <rect x="80" y="560" width="80" height="28" rx="14" fill="#3B82F6" opacity="0.15"/>
  <text x="120" y="579" font-family="Arial" font-size="13" fill="#3B82F6" text-anchor="middle">AI</text>

  <rect x="175" y="560" width="130" height="28" rx="14" fill="#3B82F6" opacity="0.15"/>
  <text x="240" y="579" font-family="Arial" font-size="13" fill="#3B82F6" text-anchor="middle">Automation</text>

  <rect x="320" y="560" width="150" height="28" rx="14" fill="#3B82F6" opacity="0.15"/>
  <text x="395" y="579" font-family="Arial" font-size="13" fill="#3B82F6" text-anchor="middle">Cybersecurity</text>

  <rect x="485" y="560" width="80" height="28" rx="14" fill="#3B82F6" opacity="0.15"/>
  <text x="525" y="579" font-family="Arial" font-size="13" fill="#3B82F6" text-anchor="middle">Cloud</text>
</svg>
